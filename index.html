<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>בדיקת קבוצה</title>

<style>
  /* בסיס */
  :root{
    --page-max: 480px;      /* רוחב עמוד בנייד */
    --card-pad: 16px;
    --radius: 10px;
    --brand: #0078d4;
  }

  html, body{
    height: 100%;
  }

  body{
    font-family: system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;           /* יקטן בנייד */
    text-align:center;
  }

  /* תמונות ברירת‑מחדל רספונסיביות (כולל הבאנר) */
  img{ max-width:100%; height:auto; display:block; }

  /* באנר עליון – חשוב: שיהיה <img class="banner"> */
  .banner{
    width: 100%;
    max-width: min(900px, 95vw);
    margin: 0 auto 25px;
    border-radius: 10px;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
    object-fit: contain;            /* לא ייחתך בתצוגה צרה */
  }

  /* כרטיס כללי */
  .card{
    background:#fff;
    padding:22px;
    margin:18px auto;
    max-width:560px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
  }

  .title{
    margin:0 0 10px;
    font-size:22px;
  }

  /* אזור ראשי – רישום ובדיקת קבוצה */
  .main-actions input,
  .main-actions button{
    width:100%;
    max-width:360px;
    padding:12px 14px;
    margin:8px auto;
    display:block;
    border-radius:8px;
    font-size:16px;
  }

  .main-actions input{
    border:1px solid #c9cdd1;
  }

  .main-actions button{
    background:var(--brand);
    color:#fff;
    border:0;
    cursor:pointer;
  }
  .main-actions button:hover{ opacity:.92; }

  /* אזור משני – ניהול קבצים */
  .small .title{ font-size:18px; }
  .small label{
    display:block; font-weight:600; margin-bottom:6px; font-size:13px; color:#222;
  }
  .small input[type=file]{ width:100%; max-width:280px; font-size:12px; }
  .small button{
    padding:8px 10px; font-size:12px; background:#0ea5e9; color:#fff; border:0; border-radius:7px; cursor:pointer;
  }
  .status{ font-size:12px; margin-top:6px; color:#4b5563; }

  .hidden{ display:none !important; }

  /* Overlay */
  #overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.5);
    display:none; align-items:center; justify-content:center;
  }
  #overlay .panel{
    background:#fff; padding:25px; border-radius:12px;
    max-width:420px; width:90%; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  #closeBtn{
    margin-top:14px; background:#334155; color:#fff; border:0; padding:10px 14px; border-radius:8px; cursor:pointer;
  }

  /* סרגל ניהול קבצים */
  .gate{
    margin:0 auto 6px auto; max-width:560px; color:#475569; font-size:13px;
  }
  .gate button{
    padding:6px 10px; font-size:12px; background:#64748b; color:#fff; border:0; border-radius:6px; cursor:pointer;
  }

  /* ===== התאמות לנייד / Portrait (iPhone/Android) ===== */
  @media (orientation: portrait){
    body{ padding:12px; }

    /* מרכזים ומגבילים רוחב כדי למנוע "חצי מסך" */
    .banner, .card, .gate{
      max-width: var(--page-max);
      margin-left:auto; margin-right:auto;
    }

    /* הבאנר: נמוך יותר, לא חוצה חצי מסך */
    .banner{
      border-radius:8px;
      margin-bottom:16px;
      max-height: 110px;      /* ← אם עדיין גדול – נסי 100px או 96px */
    }

    .card{
      padding: var(--card-pad);
      margin:14px auto;
      border-radius: var(--radius);
    }

    .title{ font-size:18px; }

    .main-actions input,
    .main-actions button{
      font-size:15px;
      padding:10px 12px;
      height:40px;            /* גבוה נוח לאצבע */
      max-width:100%;         /* לא יחרוג לצדדים */
    }

    .small .title{ font-size:16px; }
    .gate{ font-size:12px; }

    #overlay .panel{
      padding:18px;
      width: 92%;
      max-width: 360px;
    }
  }

  /* טלפונים צרים במיוחד */
  @media (max-width: 360px){
    .banner{ max-height: 96px; }
    #overlay .panel{ max-width: 320px; }
  }
</style>
</head>

  <!-- אזור ראשי – רישום ובדיקת קבוצה -->
  <div class="card main-actions">
    <h3 class="title">רישום ובדיקת קבוצה</h3>
    <input type="email" id="email" placeholder="הזיני מייל" />
    <button id="checkBtn">בדיקת קבוצה</button>
  </div>

  <!-- כפתור הצגת ניהול קבצים (מוגן בסיסמה) -->
  <div class="gate">
    <button id="revealFilesBtn" type="button" title="הצגת ניהול קבצים">הצג ניהול קבצים</button>
    <span> (דורש סיסמה)</span>
  </div>

  <!-- אזור משני – ניהול קבצים (מוסתר עד סיסמה) -->
  <div id="filesCard" class="card small hidden">
    <h3 class="title">ניהול קבצים</h3>

    <label for="csvFile">טעינת קובץ CSV (קטן למטה)</label>
    <input type="file" id="csvFile" accept=".csv" />
    <div id="csvStatus" class="status"></div>

    <div style="height:10px"></div>
    <button id="btnDownload">הורדת קובץ נרשמים (CSV)</button>
    <div id="downloadStatus" class="status"></div>
  </div>

  <!-- הודעת מסך -->
  <div id="overlay">
    <div class="panel">
      <h2 id="msgTitle"></h2>
      <p id="msgText"></p>
      <button id="closeBtn">סגירה</button>
    </div>
  </div>

<script>
/* ===== מצב וזיהוי אלמנטים ===== */
let mapping = {};
const $ = s => document.querySelector(s);

const emailEl = $('#email');
const checkBtn = $('#checkBtn');

const revealBtn = $('#revealFilesBtn');
const filesCard = $('#filesCard');

const csvInput = $('#csvFile');
const csvStatus = $('#csvStatus');

const btnDownload = $('#btnDownload');
const downloadStatus = $('#downloadStatus');

const overlay = $('#overlay');
const msgTitle = $('#msgTitle');
const msgText  = $('#msgText');
const closeBtn = $('#closeBtn');

/* ===== עוזרים ===== */
const toKey = s => (s || '').trim().toLowerCase();

function showOverlay(title, text){
  if(!overlay){ alert(text); return; }
  msgTitle.innerText = title;
  msgText.innerText  = text;
  overlay.style.display = 'flex';
}
function hideOverlay(){ overlay.style.display = 'none'; }
closeBtn.addEventListener('click', hideOverlay);

/* ===== שער סיסמה לניהול הקבצים ===== */
revealBtn.addEventListener('click', ()=>{
  const pwd = prompt('הכנסי סיסמה כדי להציג את ניהול הקבצים:');
  if(!pwd) return;
  if(pwd.trim().toUpperCase() === 'REUT'){
    filesCard.classList.remove('hidden');
  }else{
    alert('סיסמה שגויה');
  }
});

/* ===== CSV parser קטן ===== */
function parseCSV(text){
  const rows = [];
  let row=[], field="", inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c === '"'){
      if(inQ && text[i+1] === '"'){ field+='"'; i++; }
      else inQ = !inQ;
    }else if(c === ',' && !inQ){
      row.push(field); field="";
    }else if((c === '\n' || c === '\r') && !inQ){
      if(field !== "" || row.length){ row.push(field); rows.push(row); row=[]; field=""; }
    }else{
      field += c;
    }
  }
  if(field !== "" || row.length){ row.push(field); rows.push(row); }
  return rows;
}

/* ===== טעינת CSV מ-GitHub ===== */
fetch("data.csv")
  .then(response => response.text())
  .then(text => {
    const data = parseCSV(text);
    if(data.length < 2){
      alert('קובץ לא תקין');
      return;
    }

    const headers = data[0];
    const idIndex    = headers.indexOf('Employee ID');
    const groupIndex = headers.indexOf('Group');

    if(idIndex === -1 || groupIndex === -1){
      alert('חובה עמודות Employee ID ו-Group');
      return;
    }

    mapping = {};

    for(let i=1;i<data.length;i++){
      const email = data[i][idIndex];
      const group = data[i][groupIndex];
      if(email){
        mapping[toKey(email)] = group;
      }
    }

    csvStatus.innerText = 'נטענו ' + (data.length - 1) + ' רשומות';
  })
  .catch(err => {
    console.error(err);
    alert("שגיאה בטעינת הנתונים");
  });

/* ===== יומן מקומי ===== */
function readLog(){ try{ return JSON.parse(localStorage.getItem('emailLog_prod_v1') || '[]'); }catch(e){ return []; } }
function writeLog(arr){ localStorage.setItem('emailLog_prod_v1', JSON.stringify(arr)); }
function appendLog(email, group){
  const log = readLog();
  const now = new Date();
  const ts = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')
           +' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  log.push({timestamp:ts, email, group});
  writeLog(log);
}

/* ===== בדיקת קבוצה (גדול) ===== */
checkBtn.addEventListener('click', ()=>{
  const val = emailEl.value;
  if(!val || !val.trim()){ alert('נא להזין מייל תקין'); return; }
  const k = toKey(val);
  if(mapping[k]){
    showOverlay('בוקר טוב!', 'הינך בקבוצה מספר ' + mapping[k]);
    appendLog(k, mapping[k]);
  }else{
    showOverlay('לא נמצאה התאמה', 'לא נמצאה קבוצה עבור המייל שהוזן. אנא פני לרעות שמחון.');
    appendLog(k, '');
  }
});
emailEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter') checkBtn.click(); });

/* ===== הורדת קובץ נרשמים (קטן) ===== */
function buildLogCSV(){
  const arr = readLog();
  let csv = 'Timestamp,Email,Group\n';
  arr.forEach(r => { csv += `${r.timestamp},${r.email},${r.group}\n`; });
  return csv;
}
function downloadCSV(){
  const arr = readLog();
  if(!arr.length){ downloadStatus.innerText = 'אין נתונים להורדה'; return; }
  const blob = new Blob([buildLogCSV()], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'email_log.csv';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  downloadStatus.innerText = 'הקובץ הורד בהצלחה';
}
